name: Update Lernhub Index

on:
  push:
    branches: [main]
    paths:
      - 'mathe/**'
      - 'physik/**'
      - 'geschichte/**'
      - 'musik/**'
      - 'deutsch/**'
      - 'biologie/**'
      - 'religion/**'
      - 'astronomie/**'
      - 'englisch/**'
      - 'informatik/**'
      - 'grw/**'

jobs:
  update-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate index.html
        run: node generate-index.js

      - name: Commit updated index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: update index.html [skip ci]"
          git push
